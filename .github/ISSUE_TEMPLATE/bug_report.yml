name: Bug Report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Start the server with...
        2. Navigate to...
        3. Click on...
        4. See error
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Terminal output, browser console errors, or screenshots
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `git describe --tags`
